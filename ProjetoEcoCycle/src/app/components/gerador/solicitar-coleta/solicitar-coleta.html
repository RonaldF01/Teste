<div class="layout">

  <app-sidebar
    perfil="gerador"
    (menuAlterado)="alterarMenu($event)">
  </app-sidebar>

  <main
    class="conteudo"
    [class.menu-fechado]="!menuAberto">

    <div class="pagina-coleta">

      <!-- Cabeçalho -->

      <div class="pagina-header">

        <h1>Solicitar Coleta</h1>

        <p>
          Preencha os dados para solicitar uma coleta de resíduos.
        </p>

      </div>

      <!-- Card -->

      <div class="card-formulario">

        <!-- Tipo -->

        <div class="campo">

          <label for="tipoResiduo">

            <i class="fa-solid fa-recycle"></i>

            Tipo de Resíduo

          </label>

          <select
            id="tipoResiduo"
            name="tipoResiduo"
            [(ngModel)]="tipoResiduo">

            <option value="">
              Selecione o tipo
            </option>

            <option value="Papel / Papelão">
              Papel / Papelão
            </option>

            <option value="Plástico">
              Plástico
            </option>

            <option value="Metal">
              Metal
            </option>

            <option value="Vidro">
              Vidro
            </option>

            <option value="Eletrônico (REEE)">
              Eletrônico (REEE)
            </option>

            <option value="Óleo">
              Óleo
            </option>

            <option value="Outros">
              Outros
            </option>

          </select>

        </div>

        <!-- Peso -->

        <div class="campo">

          <label for="pesoEstimado">

            <i class="fa-solid fa-weight-hanging"></i>

            Peso Estimado (kg)

          </label>

          <input
            id="pesoEstimado"
            name="pesoEstimado"
            type="number"
            min="1"
            [(ngModel)]="pesoEstimado"
            placeholder="Ex: 500">

        </div>

        <!-- Endereço -->

        <div class="campo">

          <label for="enderecoColeta">

            <i class="fa-solid fa-location-dot"></i>

            Endereço de Coleta

          </label>

          <input
            id="enderecoColeta"
            name="enderecoColeta"
            type="text"
            [(ngModel)]="enderecoColeta"
            placeholder="Rua, número, bairro...">

        </div>

        <!-- Data e Horário -->

        <div class="linha">

          <div class="campo">

            <label for="dataDesejada">

              <i class="fa-solid fa-calendar"></i>

              Data Desejada

            </label>

            <input
              id="dataDesejada"
              name="dataDesejada"
              type="date"
              [(ngModel)]="dataDesejada">

          </div>

          <div class="campo">

            <label for="horarioPreferido">

              <i class="fa-solid fa-clock"></i>

              Horário Preferido

            </label>

            <select
              id="horarioPreferido"
              name="horarioPreferido"
              [(ngModel)]="horarioPreferido">

              <option value="">
                Selecione
              </option>

              <option value="Manhã (8h às 12h)">
                Manhã (8h às 12h)
              </option>

              <option value="Tarde (13h às 17h)">
                Tarde (13h às 17h)
              </option>

              <option value="Noite (18h às 22h)">
                Noite (18h às 22h)
              </option>

            </select>

          </div>

        </div>

        <!-- Observações -->

        <div class="campo">

          <label for="observacoes">
            Observações
          </label>

          <textarea
            id="observacoes"
            name="observacoes"
            rows="5"
            [(ngModel)]="observacoes"
            placeholder="Informações adicionais sobre o resíduo ou local...">
          </textarea>

        </div>

        <!-- Botão -->

        <button
          type="button"
          class="btn-enviar"
          (click)="solicitarColeta()">

          <i class="fa-solid fa-circle-check"></i>

          Solicitar Coleta

        </button>

      </div>

    </div>

  </main>

</div>
